<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenEvent View</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar" aria-label="Query filters">
        <div class="brand">
          <h1>OpenEvent View</h1>
          <span id="statusText" class="status-text">Ready</span>
        </div>
        <form id="queryForm" class="query-form">
          <label>
            <span>Principal</span>
            <input id="principalInput" name="principal" inputmode="numeric" autocomplete="off" required />
          </label>
          <label class="token-field">
            <span>Token</span>
            <input id="tokenInput" name="token" type="password" autocomplete="off" required />
          </label>
          <label>
            <span>Channel</span>
            <input id="channelInput" name="channel_id" inputmode="numeric" autocomplete="off" />
          </label>
          <label class="checkbox-field">
            <input id="recipientInput" name="only_my_recipient" type="checkbox" />
            <span>Only recipient</span>
          </label>
          <button id="searchButton" type="submit">Search</button>
        </form>
      </section>

      <section class="results-head" aria-live="polite">
        <div>
          <strong id="resultTitle">History Messages</strong>
          <span id="resultMeta"></span>
        </div>
        <button id="nextButton" type="button" disabled>Next Page</button>
      </section>

      <section id="messageList" class="message-list" aria-label="History message list">
        <div class="empty-state">Enter a principal and token to query history messages.</div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
